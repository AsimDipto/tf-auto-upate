name: Toffee Auto Update

on:
  schedule:
    - cron: '0 */3 * * *' 
  workflow_dispatch:      
  push:
    paths:
      - 'tf.zip'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y p7zip-full
          pip install requests

      - name: Extract Script
        # Eikhane 'tf.zip' bebohar kora hoyeche apnar repo onujayi
        run: |
          mkdir -p tmp_script
          7z x tf.zip -p"${{ secrets.TOFFEE_ZIP_PASSWORD }}" -otmp_script

      - name: Run Python Script
        # Jodi zip extract hoy, tobe script cholbe
        run: |
          ls -R tmp_script # Debug: check korbe file extract hoyeche ki na
          python3 tmp_script/update_toffee.py

      - name: Cleanup
        run: rm -rf tmp_script

      - name: Commit Updated Files
        run: |
          git config --global user.name "Asim Dipto"
          git config --global user.email "asimdipto@example.com"
          git add toffee_OTT_Navigator.m3u toffee_NS_Player.m3u toffee_channel_data.json
          git commit -m "🔁 Auto update" || echo "No changes to commit"
          git push
