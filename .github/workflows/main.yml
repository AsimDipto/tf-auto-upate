name: Toffee Private Smart Loop

on:
  schedule:
    - cron: '0 0 * * *' # প্রতিদিন সকালে একবার অটো স্টার্ট হবে
  workflow_dispatch:      
  push:
    paths:
      - 'tf.zip'

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup
        run: |
          # রান টাইম কমাতে apt update বাদ দেওয়া হয়েছে
          sudo apt install -y p7zip-full
          pip install requests

      - name: Run Python Script
        run: |
          mkdir -p tmp_script
          7z x tf.zip -p"${{ secrets.TOFFEE_ZIP_PASSWORD }}" -y -otmp_script
          python3 tmp_script/tf.py
          rm -rf tmp_script

      - name: Push and Check Update
        id: check_update
        run: |
          git config --global user.name "Asim Dipto"
          git config --global user.email "asimdipto@github.com"
          git add .
          if git diff --staged --quiet; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto Sync: $(date +'%H:%M:%S')"
            git pull origin main --rebase
            git push origin main
            echo "updated=true" >> $GITHUB_OUTPUT
          fi

      - name: Smart Loop Trigger
        if: always() # রান ফেইল করলেও যেন পরেরটা ট্রিগার হয়
        run: |
          # বাংলাদেশ সময় নির্ধারণ
          HOUR=$(date -u -d '6 hours' +%H)
          MIN=$(date -u -d '6 hours' +%M)
          
          # রাত ১২:৩০ (০০:৩০) থেকে সকাল ৬:০০ পর্যন্ত বন্ধ থাকবে
          if [ "$HOUR" -eq 00 ] && [ "$MIN" -ge 30 ] || [ "$HOUR" -lt 06 ]; then
              echo "Night time (12:30 AM - 6:00 AM). Loop Stopped."
          else
              # আপডেট হলে ৫০ মিনিট পর, না হলে ১৫ মিনিট পর রান হবে
              if [ "${{ steps.check_update.outputs.updated }}" = "true" ]; then
                WAIT_TIME=3000
                echo "Update found! Scheduling next run in 50 minutes."
              else
                WAIT_TIME=900
                echo "No update. Scheduling next run in 15 minutes."
              fi

              # Sleep-এর বদলে সরাসরি ব্যাকগ্রাউন্ড ট্রিগার (মিনিট বাঁচাতে)
              # এখানে sleep দেওয়া মানেই মিনিট লস, তাই আমরা রান শেষ করে দেব
              
              sleep 10 # সামান্য গ্যাপ দিয়ে ট্রিগার পাঠানো
              curl -X POST -H "Authorization: token ${{ secrets.MY_PAT_TOKEN }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/toffee_update.yml/dispatches \
              -d '{"ref":"main"}'
          fi
