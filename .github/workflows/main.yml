name: Toffee Instant Sync

on:
  schedule:
    - cron: '*/17 0-18 * * *'
  workflow_dispatch:      
  push:
    paths:
      - 'tf.zip'

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup
        run: |
          sudo apt install -y p7zip-full
          pip install requests

      - name: Run
        run: |
          mkdir -p tmp_script
          7z x tf.zip -p"${{ secrets.TOFFEE_ZIP_PASSWORD }}" -y -otmp_script
          python3 tmp_script/tf.py
          rm -rf tmp_script

      - name: Push
        run: |
          git config --global user.name "Asim Dipto"
          git config --global user.email "asimdipto@github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No change"
          else
            git commit -m "Auto Sync: $(date +'%H:%M:%S')"
            git pull origin main --rebase
            # এখানে অটোমেটিক ডিফল্ট টোকেন কাজ করবে
            git push origin main
          fi
