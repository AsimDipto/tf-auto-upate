name: Toffee Smart Auto Sync

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch:      
  push:
    paths:
      - 'tf.zip'          

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          persist-credentials: true

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y p7zip-full
          pip install requests

      - name: Extract Script
        run: |
          mkdir -p tmp_script
          7z x tf.zip -p"${{ secrets.TOFFEE_ZIP_PASSWORD }}" -otmp_script

      - name: Run Python Script
        run: |
          
          python3 tmp_script/tf.py

      - name: Cleanup
        run: rm -rf tmp_script

      - name: Commit and Push
        run: |
          git config --global user.name "Asim Dipto"
          git config --global user.email "asimdipto@example.com"
          
          
          git pull origin main --rebase
          
          git add toffee_OTT_Navigator.m3u toffee_NS_Player.m3u toffee_channel_data.json
          
        
          git commit -m "🔁 Auto sync with source" || echo "No changes to commit"
          git push origin main
