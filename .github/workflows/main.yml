name: Toffee Auto Update

on:
  schedule:
    - cron: '*/30 * * * *' 
  workflow_dispatch:      
  push:
    paths:
      - 'tf.zip'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history nibe conflict erate

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y p7zip-full
          pip install requests

      - name: Extract Script
        run: |
          mkdir -p tmp_script
          7z x tf.zip -p"${{ secrets.TOFFEE_ZIP_PASSWORD }}" -y -otmp_script

      - name: Run Python Script
        run: python3 tmp_script/tf.py

      - name: Cleanup
        run: rm -rf tmp_script

            - name: Commit and Push Changes
        run: |
          git config --global user.name "Asim Dipto"
          git config --global user.email "asimdipto@github.com"
          
          # ১. প্রথমে সব নতুন ফাইল অ্যাড করুন
          git add toffee_OTT_Navigator.m3u toffee_NS_Player.m3u toffee_channel_data.json
          
          # ২. ফাইলগুলো আগে সেভ (Commit) করে নিন, নাহলে রিবেস এরর দিবে (ইমেজ ১ ও ২ এর সমাধান)
          git commit -m "🔁 Auto Update: Links & Logos" || echo "No changes to commit"
          
          # ৩. এখন রিমোট থেকে নতুন কিছু থাকলে তা নিয়ে নিন
          git pull origin main --rebase
          
          # ৪. ফাইনাল পুশ
          git push origin main

