name: Toffee Instant Sync

on:
  schedule:
    - cron: '0 * * * *' # Runs every 1 hour
  workflow_dispatch:      
  push:
    paths:
      - 'tf.zip'

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Environment & Run Scraper
        env:
          ZIP_PASS: ${{ secrets.TOFFEE_ZIP_PASSWORD }}
        run: |
          sudo apt install -y p7zip-full > /dev/null 2>&1
          pip install requests > /dev/null 2>&1
          mkdir -p tmp_script
          7z x tf.zip -p"$ZIP_PASS" -y -otmp_script > /dev/null 2>&1
          python3 tmp_script/tf.py
          rm -rf tmp_script

      - name: Push Updated Playlists
        run: |
          git config --global user.name "Asim Dipto"
          git config --global user.email "asimdipto@github.com"
          git add .
          if ! git diff --staged --quiet; then
            git commit -m "Auto Sync: $(date +'%Y-%m-%d %H:%M:%S')"
            git pull origin main --rebase
            git push origin main
          else
            echo "No changes found."
          fi
