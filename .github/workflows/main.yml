name: AD IPTV PRO Auto Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: sync-group
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Extract and Run Script
        run: |
          7z x tf.zip -p"${{ secrets.TOFFEE_ZIP_PASSWORD }}" -y
          python3 tf.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Asim Dipto"
          git config --global user.email "asimdipto@github.com"
          
          # 1. Add files first to avoid "unstaged changes" error
          git add .
          
          # 2. Pull with rebase now that changes are staged
          git pull origin main --rebase
          
          # 3. Commit only if there's something new
          git commit -m "Auto Update: Links & Logos (Run ID: ${{ github.run_id }})" || exit 0
          
          # 4. Final push
          git push origin main
