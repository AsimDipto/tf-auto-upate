name: Toffee Smart Auto Sync

on:
  schedule:
    - cron: '*/30 * * * *' # প্রতি ৩০ মিনিট পর পর অটো রান হবে
  workflow_dispatch:      # আপনি চাইলে গিটহাব থেকে ম্যানুয়ালি রান করতে পারবেন
  push:
    paths:
      - 'tf.zip'          # আপনার tf.zip ফাইল আপডেট করলেই এটি রান হবে

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ফুল হিস্ট্রি ডাউনলোড করবে যেন পুশ রিজেক্ট না হয়
          persist-credentials: true

      - name: Install Tools
        run: |
          sudo apt update
          sudo apt install -y p7zip-full
          pip install requests

      - name: Extract Script
        run: |
          mkdir -p tmp_script
          7z x tf.zip -p"${{ secrets.TOFFEE_ZIP_PASSWORD }}" -otmp_script

      - name: Run Python Script
        run: |
          # আপনার জিপের ভেতর ফাইলের নাম tf.py হতে হবে
          python3 tmp_script/tf.py

      - name: Cleanup
        run: rm -rf tmp_script

      - name: Commit and Push
        run: |
          git config --global user.name "Asim Dipto"
          git config --global user.email "asimdipto@example.com"
          
          # ইমেজ ৯-এর এরর এড়াতে পুশ করার আগে রিমোট চেঞ্জ পুল করে নিবে
          git pull origin main --rebase
          
          git add toffee_OTT_Navigator.m3u toffee_NS_Player.m3u toffee_channel_data.json
          
          # যদি কোনো পরিবর্তন থাকে তবেই কেবল কমিট করবে
          git commit -m "🔁 Auto sync with source" || echo "No changes to commit"
          git push origin main
